name: Compile CV

on:
  push:
    paths:
      - 'files/CV_Kiefner.tex'
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Install LaTeX (TeX Live)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      
      - name: Compile LaTeX to PDF
        run: |
          cd files
          pdflatex -interaction=nonstopmode CV_Kiefner.tex
          pdflatex -interaction=nonstopmode CV_Kiefner.tex
          pdflatex -interaction=nonstopmode CV_Kiefner.tex
          cd ..
      
      - name: Commit compiled PDF
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add files/CV_Kiefner.pdf
          git commit -m "Auto-compile: Update CV PDF" || echo "No changes to commit"
          git push
